<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" >

        <title>Login</title>

        <link rel="stylesheet" href="style.css" >
    </head>

    <body id="login">
        <div class="form-container">
            <h1>Login</h1>

            <form>
                <br >
                <label>E-mail</label>
                <br >
                <input type="email" required >

                <br >
                <br >

                <label>Senha</label>
                <br >
                <input type="password" required >
                <br >
                <br >
                <button type="submit" class="button">Entrar</button>
                <a href="index.html" class="button">Voltar</a>

                <br >
                <br >
                <p>Não possui conta? Cadastre-se:</p>
                <p>
                    Na página de cadastro também é possível redefinir sua senha
                </p>
                <br >
                <a href="cadastro.html" class="button">Cadastro</a>
            </form>
        </div>
    </body>
</html>

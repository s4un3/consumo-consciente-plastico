<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">

        <title>Cadastro</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body id="cadastro">
        <div class="form-container">
            <h1>Cadastro</h1>
            <br>
            <p>Voltar à página de login</p>
            <br>
            <a href="login.html" class="button">Voltar</a>
            <br>
            <form>
                <h2>Informações pessoais</h2>
                <p>Essas informações não serão visíveis a terceiros</p>
                <br>
                <br>
                <label>Nome completo</label>
                <br>
                <input type="text" required>
                <br>
                <br>
                <label>Primeiro nome ou apelido</label>
                <br>
                <input type="text" required>
                <br>
                <br>
                <label>Data de Nascimento</label>
                <br>
                <input type="date" required>
                <br>
                <br>
                <h2>E-mail e senha</h2>
                <p>O que utilizará para o login</p>
                <br>
                <br>
                <label>E-mail</label>
                <br>
                <input type="email" required>
                <br>
                <br>
                <label>Senha</label>
                <br>
                <input type="password" required>
                <br>
                <br>
                <label>Confirme sua Senha</label>
                <br>
                <input type="password" required>
                <br>
                <br>
                <button type="submit" class="button">Cadastrar</button>
            </form>
            <br>
            <br>
            <form>
                <h1>Esqueci minha senha</h1>
                <p>Preencha os dados de acordo com o que cadastrou</p>

                <br>
                <br>
                <label>Nome completo</label>
                <br>
                <input type="text" required>
                <br>
                <br>
                <label>Primeiro nome ou apelido</label>
                <br>
                <input type="text" required>
                <br>
                <br>
                <label>Data de Nascimento</label>
                <br>
                <input type="date" required>
                <br>
                <br>
                <label>E-mail</label>
                <br>
                <input type="email" required>
                <br>
                <br>
                <label>Nova senha</label>
                <br>
                <input type="password" required>
                <br>
                <br>
                <label>Confirme sua nova senha</label>
                <br>
                <input type="password" required>
                <br>
                <br>
                <button type="submit" class="button">Redefinir senha</button>
            </form>
        </div>
    </body>
</html>
